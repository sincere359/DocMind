version: "3.8"

services:
  # ── FastAPI 后端 ──
  api:
    build: .
    container_name: docmind-api
    command: python -m docmind.api --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - docmind-uploads:/app/data/uploads
      - docmind-index:/app/data/index
      - docmind-history:/app/data/history
    env_file:
      - .env
    environment:
      - EMBEDDING_MODEL=/app/data/models/text2vec-base-chinese
      - API_HOST=0.0.0.0
      - API_PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit 前端 ──
  web:
    build: .
    container_name: docmind-web
    command: streamlit run docmind/ui.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    volumes:
      - docmind-uploads:/app/data/uploads
      - docmind-index:/app/data/index
      - docmind-history:/app/data/history
    env_file:
      - .env
    environment:
      - EMBEDDING_MODEL=/app/data/models/text2vec-base-chinese
      - HOST=0.0.0.0
      - PORT=8501
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

volumes:
  docmind-uploads:
  docmind-index:
  docmind-history:
